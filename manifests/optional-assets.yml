name: optional-assets
description: Optional harness assets. Install only when repo evidence or human preference justifies them.
assets:
  - id: claude-entrypoint
    asset_type: installable
    source: templates/core/CLAUDE.md
    default_target: CLAUDE.md
    maturity: level-0
    category: platform-pointer
    install_when: The target repo uses Claude Code or the human wants Claude Code support.
    adapt:
      - keep content as "@AGENTS.md"; put shared behavior in AGENTS.md
  - id: claude-skill-mirrors
    asset_type: installable
    source: scripts/sync_claude_skills.py
    default_target: scripts/sync_claude_skills.py
    maturity: level-0
    category: platform-skill-adapter
    install_when: The target repo uses Claude Code native skill discovery for harness-provided skills.
    satisfy_by:
      - Install shared skill source under .agents/skills/<skill>/SKILL.md.
      - Install this script at scripts/sync_claude_skills.py.
      - Create or adapt .claude/skills/<skill>/SKILL.md as the generated Claude Code mirror.
      - Keep valid Claude Code frontmatter in the mirror, including model, allowed-tools, or other Claude-specific fields when used by the target repo.
      - Run python3 -m scripts.sync_claude_skills after changing .agents/skills.
      - Add python3 -m scripts.sync_claude_skills --check to the target repo's canonical checks unless the fit proposal records a deliberate reason not to.
      - Do not replace existing Claude skill frontmatter with the shared .agents skill frontmatter unless the human explicitly approves that metadata loss.
      - Remove orphaned Claude mirrors or restore their .agents sources before considering the adapter healthy.
    adapt:
      - Claude skill names and descriptions
      - Claude-specific model, allowed-tools, or other frontmatter fields
      - existing Claude skill conflicts
      - target repo's canonical checks command
  - id: component-brief
    asset_type: installable
    source: templates/optional/docs/harness/component-brief.md
    default_target: docs/harness/component-brief.md
    maturity: level-0
    category: harness-governance
    install_when: The team expects to add or modify harness components over time.
  - id: maintainability-signals
    asset_type: installable
    source: templates/optional/docs/harness/maintainability.md
    default_target: docs/harness/maintainability.md
    maturity: level-4
    install_when: The repo has repeated maintainability, harness, cognitive, or semantic debt signals.
  - id: project-intent
    asset_type: installable
    source: templates/optional/docs/project/intent.md
    default_target: docs/project/intent.md
    maturity: level-2
    category: project-context
    install_when: >-
      Repeated planning, exploratory, scope, or value-sensitive review decisions
      need a shared project north star.
    adapt:
      - project users, stakeholders, or served systems
      - project problem and value proposition
      - current product, architecture, domain, or operational direction
      - review triggers and any narrow boundaries that prevent repeated scope confusion
  - id: diagnose-skill
    asset_type: installable
    source: skills/optional/harness-diagnose/SKILL.md
    default_target: .agents/skills/harness-diagnose/SKILL.md
    companion_files:
      - source: skills/optional/harness-diagnose/scripts/hitl-loop.template.sh
        default_target: .agents/skills/harness-diagnose/scripts/hitl-loop.template.sh
    maturity: level-0
    install_when: Agents will debug bugs, failing tests, flaky behavior, regressions, or production-like incidents.
    adapt:
      - reproduction commands
      - logs and runtime services
      - test command
      - observability tools
      - rollback or safety rules
      - existing debug or diagnose skills and platform commands
  - id: documentation-quality-audit-skill
    asset_type: installable
    source: skills/optional/documentation-quality-audit/SKILL.md
    default_target: .agents/skills/documentation-quality-audit/SKILL.md
    maturity: level-4
    install_when: Docs route agents, docs are drifting, agents are misled by documentation, or maintainability reviews repeatedly find documentation debt.
    adapt:
      - active doc paths
      - historical or provenance paths
      - source-of-truth code areas
      - doc routing maps
      - approval rules for removal
adapters:
  - id: codex
    asset_type: adapter
    source: adapters/codex
    install_when: The target repo uses Codex hooks or Codex-specific local config.
    read_before_install:
      - docs/platform-support.md
      - docs/platforms/codex.md
  - id: claude
    asset_type: adapter
    source: adapters/claude
    install_when: The target repo uses Claude Code settings, hooks, or native skill mirrors beyond the core CLAUDE.md pointer.
    read_before_install:
      - docs/platform-support.md
      - docs/platforms/claude-code.md
  - id: pre-commit
    asset_type: adapter
    source: adapters/pre-commit
    install_when: The target repo uses pre-commit or wants local deterministic checks before commit.
    read_before_install:
      - docs/platform-support.md
      - adapters/pre-commit/README.md
