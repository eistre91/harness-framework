name: bootstrap
description: Assets used while fitting this framework to a target repo. These usually should not remain installed in the target repo.
assets:
  - id: principles-doc
    asset_type: bootstrap
    source: docs/principles.md
    use_when: Understanding the framework principles before fitting a harness.
  - id: staged-installer
    asset_type: bootstrap
    source: docs/installer.md
    use_when: Starting the default staged installation workflow.
  - id: level-0-installer-checklist
    asset_type: bootstrap
    source: docs/install/level-0.md
    use_when: Installing and validating the Level 0 foundation.
  - id: framework-doc
    asset_type: bootstrap
    source: docs/framework.md
    use_when: Understanding or editing the framework shape and rationale.
  - id: implementation-guide
    asset_type: bootstrap
    source: docs/implementation-guide.md
    use_when: Consulting broad installation reference after the staged installer routes there.
  - id: maturity-model
    asset_type: bootstrap
    source: docs/maturity-model.md
    use_when: Choosing or reviewing maturity after the current stage requires it.
  - id: portable-assets
    asset_type: bootstrap
    source: docs/portable-assets.md
    use_when: Distinguishing bootstrap, installable, optional, and adapter assets.
  - id: platform-support
    asset_type: bootstrap
    source: docs/platform-support.md
    use_when: Adding platform-specific support such as hooks, settings, skill adapters, or cross-tool behavior.
  - id: codex-platform-support
    asset_type: bootstrap
    source: docs/platforms/codex.md
    use_when: Adding Codex-specific hooks, config, or skill loading support.
  - id: claude-code-platform-support
    asset_type: bootstrap
    source: docs/platforms/claude-code.md
    use_when: Adding Claude Code-specific hooks, settings, native skills, or instruction loading support.
  - id: claude-skill-sync-script
    asset_type: bootstrap
    source: scripts/sync_claude_skills.py
    use_when: Installing generated Claude Code skill mirrors from canonical .agents/skills sources.
  - id: level-0-manifest
    asset_type: bootstrap
    source: manifests/level-0.yml
    use_when: Selecting default installable starter assets.
  - id: level-1-manifest
    asset_type: bootstrap
    source: manifests/level-1.yml
    use_when: Selecting additive assets and behaviors for bounded work execution.
  - id: optional-assets-manifest
    asset_type: bootstrap
    source: manifests/optional-assets.yml
    use_when: Selecting optional pull-ins justified by repo evidence.
