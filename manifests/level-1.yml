name: level-1
description: Additive asset and behavior set for bounded agent work execution.
base: manifests/level-0.yml
install_policy: Install after Level 0 when repo evidence shows work needs stronger executable scope, acceptance evidence, or implementation guidance.
definition:
  - use Agent Work Brief tiers intentionally
  - require explicit non-goals when scope could sprawl
  - require ambiguity and decision notes when product or interface choices affect implementation
  - require boundary/interface sections for public APIs, CLIs, integrations, modules, jobs, file formats, or other consumed surfaces
  - require acceptance evidence for externally visible or boundary-changing behavior
  - keep progress/divergence state in the canonical brief location when work spans sessions or departs from the original plan
assets:
  - id: implement-skill
    asset_type: installable
    source: skills/core/harness-implement/SKILL.md
    default_target: .agents/skills/harness-implement/SKILL.md
    required: true
    adapt:
      - repo checks command
      - project context paths
      - test conventions
      - project-specific implementation risks
      - existing implementation skills or commands
common_starter_pull_ins:
  - id: repo-checks-on-stop
    asset_type: behavior
    install_when: scripts/repo-checks.sh is real, reasonably fast, actionable, and the team wants automatic feedback during agent sessions.
    notes: Broad hook policy, secret guards, destructive-action rules, shared hook runners, and cross-platform enforcement remain selected Level 3 deterministic controls.
not_part_of_level_definition:
  - diagnose skill
  - broad hooks or automatic verification beyond the optional repo-checks-on-stop pull-in
  - SPEC-MAP.md
  - CONTEXT.md
  - .harness.yml
  - maintainability sensors
