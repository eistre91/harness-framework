name: level-0
description: Default starter asset set for an initial minimal harness trial.
install_policy: Install only after a Harness Fit Proposal confirms the target repo needs these assets.
assets:
  - id: agents-entrypoint
    asset_type: installable
    source: templates/core/AGENTS.md
    default_target: AGENTS.md
    required: true
    adapt:
      - primary work source
      - canonical work brief location
      - temporary draft location
      - lifecycle/status update location
      - project context path
  - id: verification-script
    asset_type: installable
    source: templates/core/scripts/verify.sh
    default_target: scripts/verify.sh
    required: true
    adapt:
      - commands derived from README, CI, Makefile, tox, nox, or project config
      - CI parity where practical
      - preserve executable mode or run chmod +x after copying
  - id: harness-doc-index
    asset_type: installable
    source: templates/core/docs/harness/README.md
    default_target: docs/harness/README.md
    required: true
    adapt:
      - source framework provenance
      - target maturity
      - installed files
      - intentional deferrals
  - id: work-brief-template
    asset_type: installable
    source: templates/core/docs/harness/work-brief.md
    default_target: docs/harness/work-brief.md
    required: true
    adapt:
      - required acceptance evidence for the repo's work types
      - tracker references if useful
  - id: review-guidance
    asset_type: installable
    source: skills/core/review/SKILL.md
    default_target: .agents/skills/review/SKILL.md
    required: true
    adapt:
      - project-specific review risks
defer_by_default:
  - hooks
  - platform pointer files for unused tools
  - skills beyond review
  - project docs/routing
  - docs/harness/component-brief.md
  - docs/harness/maintainability.md
  - .harness.yml
  - SPEC-MAP.md
  - CONTEXT.md
