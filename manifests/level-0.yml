name: level-0
description: Default starter asset set for an initial minimal harness trial.
install_policy: Install only after a Harness Fit Proposal confirms the target repo needs these assets.
assets:
  - id: agents-entrypoint
    asset_type: installable
    source: templates/core/AGENTS.md
    default_target: AGENTS.md
    required: true
    adapt:
      - primary work source
      - canonical work brief location
      - temporary draft location
      - lifecycle/status update location
      - project context path
      - installed harness skill names and platform-specific skill conflicts
      - distinction between committed .agents/skills and gitignored .agent/ local drafts
  - id: repo-checks-script
    asset_type: installable
    source: templates/core/scripts/repo-checks.sh
    default_target: scripts/repo-checks.sh
    required: true
    adapt:
      - commands derived from README, CI, existing scripts, or project config
      - CI parity where practical
      - preserve executable mode or run chmod +x after copying
  - id: harness-doc-index
    asset_type: installable
    source: templates/core/docs/harness/README.md
    default_target: docs/harness/README.md
    required: true
    adapt:
      - source framework provenance
      - target maturity
      - installation mode and completeness
      - installed files
      - intentional deferrals
      - existing harness component decisions
      - post-install communication audit
  - id: harness-fit-proposal-record
    asset_type: installable
    source: templates/core/docs/harness/fit-proposal.md
    default_target: docs/harness/fit-proposal.md
    required_when: The team chooses a separate durable fit proposal file instead of embedding the final decision log in docs/harness/README.md.
    adapt:
      - final approved proposal
      - decisions changed after human review
  - id: work-brief-skill
    asset_type: installable
    source: skills/core/harness-work-brief/SKILL.md
    default_target: .agents/skills/harness-work-brief/SKILL.md
    companion_files:
      - source: skills/core/harness-work-brief/work-brief-template.md
        default_target: .agents/skills/harness-work-brief/work-brief-template.md
    required: true
    adapt:
      - canonical brief location
      - required acceptance evidence for the repo's work types
      - tracker references if useful
      - local fallback and commit policy
      - project context paths
      - existing work-shaping skills or commands
  - id: work-brief-fallback-gitignore
    asset_type: behavior
    required_when: A local work brief fallback directory is introduced.
    satisfy_by:
      - Add the fallback directory, such as .agent/work/, to .gitignore.
      - Do not commit local fallback brief instances.
      - If the team wants versioned in-repo briefs, choose an explicit durable repo path such as docs/work/ as the canonical brief location.
    adapt:
      - local fallback path
      - commit policy for work brief instances
  - id: review-guidance
    asset_type: installable
    source: skills/core/harness-review/SKILL.md
    default_target: .agents/skills/harness-review/SKILL.md
    required: true
    adapt:
      - review output format
      - severity scale
      - project-specific review risks
      - existing review skills or platform review commands
defer_by_default:
  - hooks
  - platform pointer files for unused tools
  - skills beyond work-brief and review
  - project docs/routing
  - docs/harness/component-brief.md
  - docs/harness/maintainability.md
  - .harness.yml
  - SPEC-MAP.md
  - CONTEXT.md
